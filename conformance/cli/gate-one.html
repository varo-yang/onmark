<!doctype html>
<om-film>
  <style>
    html,
    body,
    om-film {
      height: 100%;
      margin: 0;
      width: 100%;
    }

    body {
      background: #000;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }

    video {
      height: 100%;
      inset: 0;
      object-fit: cover;
      position: fixed;
      width: 100%;
    }

    om-title,
    om-cta {
      background: rgb(0 0 0 / 70%);
      bottom: 12px;
      left: 12px;
      padding: 6px 10px;
      position: fixed;
    }
  </style>

  <om-scene>
    <om-shot>
      <video src="source.mp4"></video>
      <om-vo src="voice.m4a" delay="500ms">A deterministic voice-over.</om-vo>
      <om-title>Gate one</om-title>
      <om-cta delay="500ms">Render now</om-cta>
    </om-shot>
  </om-scene>

  <script type="module" data-om-motion>
    import { gsapMotion } from "onmark/motion/gsap";

    export const motion = gsapMotion({
      title({ element, timeline }) {
        timeline.from(element, {
          duration: 0.35,
          ease: "power2.out",
          opacity: 0,
          x: -24,
        });
      },
      callToAction({ element, timeline }) {
        timeline.from(element, {
          duration: 0.25,
          ease: "power2.out",
          opacity: 0,
          y: 12,
        });
      },
    });
  </script>
</om-film>
