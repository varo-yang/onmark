    <title>Onmark empty transparent presentation experiment</title>

      html,
      body {
        background: transparent;
        height: 100%;
        margin: 0;
        width: 100%;
      }
    </style>

    <script type="module">
      // This closed fixture isolates native color conversion from authored
      // browser pixels while still crossing the real runtime transaction.
      import { installRuntimeHost } from "../../../../packages/runtime/dist/src/index.js";

      installRuntimeHost({
        async load() {},
        async prepare() {},
        async seek() {},
        async confirm() {},
        async dispose() {},
      });
    </script>
