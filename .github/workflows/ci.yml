name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Install pinned pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0

      - name: Install pinned Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 26.4.0
          cache: pnpm

      - name: Verify toolchain pins
        run: |
          rustup_version=$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)
          mise_rust=$(sed -n 's/^rust = "\(.*\)"/\1/p' mise.toml)
          mise_node=$(sed -n 's/^node = "\(.*\)"/\1/p' mise.toml)
          mise_pnpm=$(sed -n 's/^pnpm = "\(.*\)"/\1/p' mise.toml)
          test "$rustup_version" = "$mise_rust"
          test "$(node --version)" = "v$mise_node"
          test "$(pnpm --version)" = "$mise_pnpm"
          test "$(node -p "require('./package.json').packageManager")" = "pnpm@$mise_pnpm"

      - name: Install TypeScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Cargo artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compiler diagnostics
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --locked --workspace --all-targets --all-features --keep-going

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features

      - name: Run tests
        run: cargo test --locked --workspace --all-features

      - name: Check generated protocol artifacts
        run: cargo xtask schema --check

      - name: Check TypeScript
        run: pnpm typecheck

      - name: Lint TypeScript and JavaScript
        run: pnpm lint

      - name: Check TypeScript and JavaScript formatting
        run: pnpm format:check

      - name: Test browser runtime
        run: pnpm test

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --workspace --no-deps

  real-process:
    name: Native real-process conformance
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Install pinned pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0

      - name: Install pinned Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 26.4.0
          cache: pnpm

      - name: Install pinned FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends ffmpeg=7:6.1.1-3ubuntu5
          test "$(dpkg-query --show --showformat='${Version}' ffmpeg)" = "7:6.1.1-3ubuntu5"

      - name: Install TypeScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pinned Chrome headless shell
        id: chrome
        run: |
          root="$RUNNER_TEMP/onmark-browser"
          pnpm exec browsers install chrome-headless-shell@149.0.7827.55 --path "$root" --install-deps
          mapfile -t binaries < <(find "$root" -type f -name chrome-headless-shell -perm /111)
          test "${#binaries[@]}" -eq 1
          printf 'shell-path=%s\n' "${binaries[0]}" >> "$GITHUB_OUTPUT"

      - name: Build browser products
        run: |
          pnpm --filter @onmark/runtime build
          pnpm --filter @onmark/authoring build
          pnpm --filter @onmark/bundler build
          chmod +x packages/bundler/dist/src/command.js

      - name: Configure real-process tool paths
        env:
          ONMARK_HEADLESS_SHELL_BINARY: ${{ steps.chrome.outputs.shell-path }}
        run: |
          tools="$RUNNER_TEMP/onmark-tools"
          mkdir -p "$tools"
          printf '%s\n' '#!/bin/sh' "exec \"$ONMARK_HEADLESS_SHELL_BINARY\" --no-sandbox \"\$@\"" > "$tools/chrome-headless-shell"
          chmod +x "$tools/chrome-headless-shell"
          ln -s /usr/bin/ffmpeg "$tools/ffmpeg"
          ln -s /usr/bin/ffprobe "$tools/ffprobe"
          ln -s "$GITHUB_WORKSPACE/packages/bundler/dist/src/command.js" "$tools/onmark-bundle"
          printf '%s\n' "$tools" >> "$GITHUB_PATH"

      - name: Cache Cargo artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release CLI candidate
        run: cargo build --locked --release -p onmark-cli

      - name: Run native and release-CLI conformance
        env:
          ONMARK_CLI: ${{ github.workspace }}/target/release/onmark
          ONMARK_HEADLESS_SHELL: ${{ runner.temp }}/onmark-tools/chrome-headless-shell
          ONMARK_FFMPEG: /usr/bin/ffmpeg
          ONMARK_FFPROBE: /usr/bin/ffprobe
        run: |
          cargo test --locked -p onmark-render --test render -- --ignored --test-threads=1
          cargo test --locked -p onmark-render --test media_seek -- --ignored --test-threads=1
          cargo test --locked -p onmark-cli --test render -- --ignored --test-threads=1
